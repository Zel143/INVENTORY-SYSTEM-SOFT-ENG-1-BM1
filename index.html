<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSense - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <img src="STOCKSENCE LOGO.png" alt="StockSense Logo" class="brand-logo">
        <p>Inventory Management System</p>
    </div>

    <div class="login-container">

        <form id="loginForm">
            <h2>Welcome</h2>
            <div class="form-group">
                <input type="text" id="username" name="username" class="input-field" placeholder="Username" required>
            </div>

            <div class="form-group" style="position: relative;">
                <input type="password" id="password" name="password" class="input-field" placeholder="Password" style="padding-right: 45px;" required>
                <button type="button" id="togglePassword" class="password-toggle" title="Show/Hide Password">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>

            <div class="form-footer">
                <a href="#" id="forgotLink">Forgot Password?</a>
            </div>

            <div class="form-group">
                <button type="submit" id="loginBtn" class="login-btn">Login</button>
            </div>

            <div class="form-footer center-footer mt-3">
                <span style="color: #a0aec0;">Don't have an account? </span><a href="signup.html" style="color: white; font-weight: 600;">Sign Up</a>
            </div>
        </form>

        <form id="resetForm" style="display: none;">
            <h2>Reset Password</h2>
            <p class="reset-instruction">Enter your email to receive an access code.</p>
            <div class="form-group">
                <input type="email" id="resetEmail" class="input-field" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <button type="submit" class="login-btn">Send Access Code</button>
            </div>
            <div class="form-footer center-footer mt-4">
                <a href="#" class="backToLoginLink">Back to Login</a>
            </div>
        </form>

        <form id="verifyCodeForm" style="display: none;">
            <h2>Enter Access Code</h2>
            <p class="reset-instruction">Enter the 6-digit code sent to your email.</p>
            <div class="form-group">
                <input type="text" id="accessCode" class="input-field" placeholder="XXXXXX" style="text-align: center; letter-spacing: 3px; font-weight: bold;" maxlength="6" required>
            </div>
            <div class="form-group">
                <button type="submit" class="login-btn">Verify & Login</button>
            </div>
            <div class="form-footer center-footer mt-4">
                <a href="#" class="backToLoginLink">Back to Login</a>
            </div>
        </form>

    </div>

    <script>
        const API = 'http://localhost:3000/api';

        // Password toggle
        document.querySelector('#togglePassword').addEventListener('click', function () {
            const pwd = document.querySelector('#password');
            const icon = document.querySelector('#eyeIcon');
            const isText = pwd.getAttribute('type') === 'text';
            pwd.setAttribute('type', isText ? 'password' : 'text');
            icon.classList.toggle('fa-eye', isText);
            icon.classList.toggle('fa-eye-slash', !isText);
        });

        // Form switching (forgot password)
        const loginForm = document.getElementById('loginForm');
        const resetForm = document.getElementById('resetForm');
        const verifyCodeForm = document.getElementById('verifyCodeForm');

        document.getElementById('forgotLink').addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.style.display = 'none';
            resetForm.style.display = 'block';
        });

        document.querySelectorAll('.backToLoginLink').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                resetForm.style.display = 'none';
                verifyCodeForm.style.display = 'none';
                loginForm.style.display = 'block';
            });
        });

        resetForm.addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Password reset is not yet supported. Please contact an administrator.');
        });

        verifyCodeForm.addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Password reset is not yet supported. Please contact an administrator.');
        });

        // Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const usernameEl = document.getElementById('username');
            const passwordEl = document.getElementById('password');

            btn.textContent = 'Logging in...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username: usernameEl.value, password: passwordEl.value })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    window.location.href = 'dashboard.html';
                } else {
                    btn.textContent = 'Login Failed — ' + (data.error || 'Invalid credentials');
                    btn.disabled = false;
                }
            } catch {
                btn.textContent = 'Connection Error — Is the server running?';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
