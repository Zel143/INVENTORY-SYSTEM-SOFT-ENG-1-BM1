<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSense - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <img src="STOCKSENCE LOGO.png" alt="StockSense Logo" class="brand-logo">
        <p>Inventory Management System</p>
    </div>

    <div class="login-container">
        
        <form id="loginForm" method="POST">
            <h2>Welcome</h2>
            <div class="form-group">
                <input type="text" id="username" name="username" class="input-field" placeholder="Username" required>
            </div>
            
            <div class="form-group" style="position: relative;">
                <input type="password" id="password" name="password" class="input-field" placeholder="Password" style="padding-right: 45px;" required>
                <button type="button" id="togglePassword" class="password-toggle" title="Show/Hide Password">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>

            <div class="form-footer">
                <a href="#" id="forgotLink">Forgot Password?</a>
            </div>

            <div class="form-group">
                <button type="submit" id="loginBtn" class="login-btn">Login</button>
            </div>

            <div class="form-footer center-footer mt-3">
                <span style="color: #a0aec0;">Don't have an account? </span><a href="signup.html" style="color: white; font-weight: 600;">Sign Up</a>
            </div>
        </form>

        <form id="resetForm" style="display: none;">
            <h2>Reset Password</h2>
            <p class="reset-instruction">Enter your email to receive an access code.</p>
            <div class="form-group">
                <input type="email" id="resetEmail" class="input-field" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <button type="submit" class="login-btn">Send Access Code</button>
            </div>
            <div class="form-footer center-footer mt-4">
                <a href="#" class="backToLoginLink">Back to Login</a>
            </div>
        </form>

        <form id="verifyCodeForm" style="display: none;">
            <h2>Enter Access Code</h2>
            <p class="reset-instruction">Enter the 6-digit code sent to your email.</p>
            <div class="form-group">
                <input type="text" id="accessCode" class="input-field" placeholder="XXXXXX" style="text-align: center; letter-spacing: 3px; font-weight: bold;" maxlength="6" required>
            </div>
            <div class="form-group">
                <button type="submit" class="login-btn">Verify & Login</button>
            </div>
            <div class="form-footer center-footer mt-4">
                <a href="#" class="backToLoginLink">Back to Login</a>
            </div>
        </form>

    </div>

    <script>
        // --- 1. Password Toggle ---
        document.querySelector('#togglePassword').addEventListener('click', function () {
            const pwd  = document.querySelector('#password');
            const icon = document.querySelector('#eyeIcon');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        });

        // --- 2. Form references ---
        const loginForm      = document.getElementById('loginForm');
        const resetForm      = document.getElementById('resetForm');
        const verifyCodeForm = document.getElementById('verifyCodeForm');

        document.getElementById('forgotLink').addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.style.display = 'none';
            resetForm.style.display = 'block';
        });

        document.querySelectorAll('.backToLoginLink').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                resetForm.style.display      = 'none';
                verifyCodeForm.style.display = 'none';
                loginForm.style.display      = 'block';
            });
        });

        // --- 3. Login via API (with distinct lockout handling) ---
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn  = document.getElementById('loginBtn');
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            btn.textContent = 'Logging in…';
            btn.disabled    = true;

            try {
                const res  = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();

                if (res.ok) {
                    window.location.href = 'dashboard.html';
                } else if (res.status === 429) {
                    // TC-10: Account locked — prominent styled error
                    showLoginError('🔒 ' + (data.error || 'Account locked. Contact your administrator.'), true);
                } else {
                    showLoginError(data.error || 'Login failed', false);
                }
            } catch {
                showLoginError('Cannot connect to server. Make sure the backend is running.', false);
            } finally {
                btn.textContent = 'Login';
                btn.disabled    = false;
            }
        });

        function showLoginError(msg, locked) {
            let err = document.getElementById('login-error');
            if (!err) {
                err = document.createElement('p');
                err.id = 'login-error';
                loginForm.querySelector('.form-group').after(err);
            }
            if (locked) {
                err.style.cssText =
                    'color:#ff4444;font-size:0.85rem;margin-top:-10px;margin-bottom:10px;' +
                    'text-align:center;font-weight:600;background:rgba(255,68,68,0.12);' +
                    'padding:8px 12px;border-radius:6px;border:1px solid rgba(255,68,68,0.35);';
            } else {
                err.style.cssText =
                    'color:#ff6b6b;font-size:0.85rem;margin-top:-10px;margin-bottom:10px;text-align:center;';
            }
            err.textContent = msg;
        }

        // --- 4. Forgot Password — server-side code generation ---
        let resetEmailTarget = '';

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn   = resetForm.querySelector('button[type="submit"]');
            const email = document.getElementById('resetEmail').value.trim();

            btn.textContent = 'Sending…';
            btn.disabled    = true;

            try {
                const res  = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (res.ok) {
                    resetEmailTarget = email;
                    const note = data.dev_code
                        ? `Code (dev mode): ${data.dev_code}`
                        : 'Access code sent to your email.';
                    showResetMsg(note, false);
                    setTimeout(() => {
                        resetForm.style.display      = 'none';
                        verifyCodeForm.style.display = 'block';
                    }, 1000);
                } else {
                    showResetMsg(data.error || 'Could not send code.', true);
                }
            } catch {
                showResetMsg('Cannot connect to server.', true);
            } finally {
                btn.textContent = 'Send Access Code';
                btn.disabled    = false;
            }
        });

        function showResetMsg(msg, isError) {
            let el = document.getElementById('reset-msg');
            if (!el) {
                el = document.createElement('p');
                el.id = 'reset-msg';
                el.style.cssText = 'font-size:0.85rem;text-align:center;margin-bottom:8px;';
                resetForm.querySelector('.reset-instruction').after(el);
            }
            el.style.color = isError ? '#ff6b6b' : '#68d391';
            el.textContent = msg;
        }

        // --- 5. Verify Reset Code — server-side validation ---
        verifyCodeForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn  = verifyCodeForm.querySelector('button[type="submit"]');
            const code = document.getElementById('accessCode').value.trim();

            btn.textContent = 'Verifying…';
            btn.disabled    = true;

            try {
                const res  = await fetch('/api/verify-reset-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: resetEmailTarget, code })
                });
                const data = await res.json();

                if (res.ok) {
                    showVerifyMsg('Code verified — please log in.', false);
                    setTimeout(() => {
                        verifyCodeForm.style.display = 'none';
                        loginForm.style.display      = 'block';
                        document.getElementById('accessCode').value = '';
                    }, 1200);
                } else {
                    showVerifyMsg(data.error || 'Incorrect code.', true);
                }
            } catch {
                showVerifyMsg('Cannot connect to server.', true);
            } finally {
                btn.textContent = 'Verify & Login';
                btn.disabled    = false;
            }
        });

        function showVerifyMsg(msg, isError) {
            let el = document.getElementById('verify-msg');
            if (!el) {
                el = document.createElement('p');
                el.id = 'verify-msg';
                el.style.cssText = 'font-size:0.85rem;text-align:center;margin-bottom:8px;';
                verifyCodeForm.querySelector('.reset-instruction').after(el);
            }
            el.style.color = isError ? '#ff6b6b' : '#68d391';
            el.textContent = msg;
        }
    </script>
</body>
</html>
