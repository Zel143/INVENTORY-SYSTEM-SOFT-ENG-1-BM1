<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSense - Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <img src="STOCKSENCE LOGO.png" alt="StockSense Logo" class="brand-logo">
        <p>Inventory Management System</p>
    </div>

    <div class="login-container">
        <h2>Sign up</h2>
        
        <form id="signupForm" action="/api/register" method="POST">
            
            <div class="form-group">
                <input type="text" id="fullName" name="full_name" class="input-field" placeholder="Full Name" required>
            </div>
            
            <div class="form-group">
                <input type="text" id="username" name="username" class="input-field" placeholder="Username (e.g. john_doe)" required minlength="3" maxlength="30" pattern="[a-zA-Z0-9_]+" title="3-30 characters: letters, numbers, underscore only">
            </div>
            
            <div class="form-group">
                <input type="email" id="emailAddress" name="email" class="input-field" placeholder="Email Address" required>
            </div>
            
            <div class="form-group" style="position: relative;">
                <input type="password" id="regPass" name="password" class="input-field" placeholder="Password" style="padding-right: 45px;" required minlength="8">
                <button type="button" class="password-toggle" onclick="togglePasswordVisibility('regPass', 'eyeIcon1')" title="Show/Hide Password">
                    <i class="fas fa-eye" id="eyeIcon1"></i>
                </button>
            </div>
            
            <div class="form-group" style="position: relative;">
                <input type="password" id="confirmPass" name="confirm_password" class="input-field" placeholder="Confirm Password" style="padding-right: 45px;" required>
                <button type="button" class="password-toggle" onclick="togglePasswordVisibility('confirmPass', 'eyeIcon2')" title="Show/Hide Password">
                    <i class="fas fa-eye" id="eyeIcon2"></i>
                </button>
            </div>

            <div class="form-group">
                <select id="role" name="role" class="input-field" required style="cursor: pointer;">
                    <option value="" disabled selected>Select Account Type</option>
                    <option value="staff">Staff</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <div class="form-group mt-4">
                <button type="submit" id="signupBtn" class="login-btn">Create Account</button>
            </div>
            
            <div class="form-footer center-footer mt-3">
                <span style="color: #a0aec0;">Already have an account? </span><a href="index.html" style="color: #cbd5e0; font-weight: 600;">Login</a>
            </div>
        </form>
    </div>

    <script>
        // --- Password Visibility Toggle Logic ---
        function togglePasswordVisibility(inputId, iconId) {
            const passwordInput = document.getElementById(inputId);
            const eyeIcon = document.getElementById(iconId);
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        // --- Register: calls /api/register ---
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const full_name = document.getElementById('fullName').value.trim();
            const username  = document.getElementById('username').value.trim().toLowerCase();
            const email     = document.getElementById('emailAddress').value.trim();
            const role      = document.getElementById('role').value;
            const pass      = document.getElementById('regPass');
            const confirm   = document.getElementById('confirmPass');
            const btn       = document.getElementById('signupBtn');

            if (!role) {
                alert('Please select an account type (Staff or Admin).');
                return;
            }

            // Password match check
            if (pass.value !== confirm.value) {
                confirm.classList.add('error');
                confirm.value = '';
                confirm.type = 'text';
                confirm.placeholder = 'Passwords do not match';
                setTimeout(() => {
                    confirm.classList.remove('error');
                    confirm.type = 'password';
                    confirm.placeholder = 'Confirm Password';
                }, 2500);
                return;
            }

            btn.innerText = 'Creating Account...';
            btn.disabled = true;
            btn.style.opacity = '0.7';

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name, username, email, password: pass.value, role })
                });
                const data = await res.json();

                if (res.ok) {
                    alert(`Account created!\n\nUsername: ${data.username}\nRole: ${data.role}\n\nYou can now log in.`);
                    window.location.href = 'index.html';
                } else {
                    btn.innerText = 'Create Account';
                    btn.disabled = false;
                    btn.style.opacity = '1';
                    alert('Error: ' + (data.error || 'Registration failed'));
                }
            } catch (err) {
                btn.innerText = 'Create Account';
                btn.disabled = false;
                btn.style.opacity = '1';
                alert('Network error. Make sure the server is running.');
            }
        });
    </script>
</body>
</html>
